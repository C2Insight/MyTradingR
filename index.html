<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투자 리서치 허브</title>
<style>
:root {
  --bg: #0d0f14;
  --sidebar: #12151c;
  --surface: #181c25;
  --border: #252a38;
  --accent: #3b82f6;
  --accent2: #10b981;
  --warn: #f59e0b;
  --report-accent: #ef4444;
  --report-bg: rgba(239,68,68,.12);
  --report-border: rgba(239,68,68,.35);
  --text: #e2e8f0;
  --text-muted: #64748b;
  --text-dim: #94a3b8;
  --tag-daily: #1d4ed8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── 상단 헤더 ── */
.topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px;
  height: 52px;
  background: var(--sidebar);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 100;
}
.topbar-logo { font-size: 18px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
.topbar-logo span { font-size: 20px; }
.topbar-stamp {
  font-size: 10px; color: var(--text-muted);
  background: var(--border); border-radius: 4px; padding: 2px 8px;
}
.topbar-spacer { flex: 1; }
.tab-group { display: flex; gap: 4px; }
.tab-btn {
  font-size: 12px; font-weight: 600;
  padding: 5px 14px; border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text-muted);
  cursor: pointer; transition: all .15s;
}
.tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.tab-btn.active-report { background: var(--report-accent); border-color: var(--report-accent); color: #fff; }
.tab-btn:hover:not(.active):not(.active-report) { border-color: var(--accent); color: var(--text); }
.tab-badge {
  display: inline-block; background: var(--accent2);
  color: #fff; font-size: 9px; font-weight: 700;
  padding: 1px 5px; border-radius: 99px; margin-left: 4px;
}
.tab-badge-report {
  display: inline-block; background: var(--report-accent);
  color: #fff; font-size: 9px; font-weight: 700;
  padding: 1px 5px; border-radius: 99px; margin-left: 4px;
}
.tab-soon {
  font-size: 9px; color: var(--text-muted);
  background: var(--border); border-radius: 99px;
  padding: 1px 6px; margin-left: 4px;
}

/* ── 메인 레이아웃 ── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── 사이드바 ── */
.sidebar {
  width: 320px; flex-shrink: 0;
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-inner { flex: 1; overflow-y: auto; padding: 16px; }
.sidebar-inner::-webkit-scrollbar { width: 4px; }
.sidebar-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* 통계 카드 */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px;
}
.stat-card .val { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1.2; }
.stat-card .lbl { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.stat-card.wide { grid-column: span 2; }

/* 검색 */
.search-wrap { position: relative; margin-bottom: 14px; }
.search-wrap input {
  width: 100%; background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 12px;
  padding: 8px 12px 8px 32px; outline: none;
  transition: border-color .15s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--text-muted); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 13px; }

/* 날짜별 그룹 */
.year-group { margin-bottom: 12px; }
.year-header {
  font-size: 11px; font-weight: 700; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: .08em;
  padding: 4px 0; margin-bottom: 6px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px; cursor: pointer;
}
.month-group { margin-bottom: 8px; }
.month-header {
  font-size: 10px; color: var(--text-muted); font-weight: 600;
  padding: 2px 4px; margin-bottom: 4px;
}
.file-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 7px;
  cursor: pointer; transition: background .12s;
  border: 1px solid transparent;
  margin-bottom: 2px;
}
.file-item:hover { background: var(--surface); border-color: var(--border); }
.file-item.active { background: rgba(59,130,246,.12); border-color: rgba(59,130,246,.35); }
.file-date { font-size: 13px; font-weight: 600; color: var(--text); }
.file-dow { font-size: 10px; color: var(--text-muted); }
.file-tag {
  font-size: 9px; font-weight: 700; padding: 2px 7px;
  border-radius: 99px; margin-left: auto;
  background: rgba(29,78,216,.3); color: #93c5fd; border: 1px solid rgba(29,78,216,.4);
}

/* ── 종목 리포트 달력 ── */
.report-month-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.report-month-nav button {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text-dim); width: 28px; height: 28px;
  border-radius: 6px; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s;
}
.report-month-nav button:hover { background: var(--border); color: var(--text); }
.report-month-label { font-size: 14px; font-weight: 700; color: var(--text); }

.report-cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 3px; margin-bottom: 16px;
}
.report-cal-dow {
  font-size: 9px; font-weight: 600; color: var(--text-muted);
  text-align: center; padding: 4px 0;
}
.report-cal-dow.sun { color: #f87171; }
.report-cal-dow.sat { color: #60a5fa; }
.report-cal-day {
  aspect-ratio: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border-radius: 6px; font-size: 12px; font-weight: 500;
  color: var(--text-dim); position: relative;
  transition: all .12s;
}
.report-cal-day.empty { visibility: hidden; }
.report-cal-day.has-data {
  color: var(--text); font-weight: 700; cursor: pointer;
  background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.15);
}
.report-cal-day.has-data:hover {
  background: rgba(239,68,68,.2); border-color: rgba(239,68,68,.4);
}
.report-cal-day.selected {
  background: var(--report-accent) !important;
  color: #fff !important;
  border-color: var(--report-accent) !important;
}
.report-cal-day .day-count {
  font-size: 8px; font-weight: 600; color: var(--text-muted);
  position: absolute; bottom: 2px;
}
.report-cal-day.has-data .day-count { color: rgba(239,68,68,.7); }
.report-cal-day.selected .day-count { color: rgba(255,255,255,.8); }
.report-cal-day.sun-day { color: #f87171; }
.report-cal-day.sat-day { color: #60a5fa; }
.report-cal-day.today { box-shadow: inset 0 0 0 1.5px var(--accent); border-radius: 6px; }

/* 리포트 목록 */
.report-date-header {
  font-size: 13px; font-weight: 700; color: var(--text);
  padding: 8px 0 6px; margin-bottom: 6px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.report-date-header .rpt-count {
  font-size: 10px; font-weight: 600; color: var(--report-accent);
  background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.2);
  padding: 1px 7px; border-radius: 99px;
}
.report-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: 7px;
  cursor: pointer; transition: background .12s;
  border: 1px solid transparent;
  margin-bottom: 2px;
}
.report-item:hover { background: var(--surface); border-color: var(--border); }
.report-item.active { background: var(--report-bg); border-color: var(--report-border); }
.report-item .rpt-icon { font-size: 14px; flex-shrink: 0; }
.report-item .rpt-name {
  font-size: 12px; font-weight: 600; color: var(--text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.report-item .rpt-tag {
  font-size: 9px; font-weight: 700; padding: 2px 7px;
  border-radius: 99px; margin-left: auto; flex-shrink: 0;
  background: rgba(239,68,68,.15); color: #fca5a5; border: 1px solid rgba(239,68,68,.25);
}
.report-no-data {
  text-align: center; padding: 20px 10px;
  font-size: 12px; color: var(--text-muted);
}

/* 년/월 퀵 점프 */
.report-year-jump {
  margin-top: 14px; padding-top: 12px;
  border-top: 1px solid var(--border);
}
.report-year-jump-title {
  font-size: 11px; font-weight: 700; color: var(--text-muted);
  margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
}
.report-months-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
}
.report-month-chip {
  font-size: 10px; text-align: center; padding: 5px 4px;
  border-radius: 5px; cursor: pointer;
  color: var(--text-muted); transition: all .12s;
}
.report-month-chip:hover { background: var(--surface); color: var(--text); }
.report-month-chip.has-data { color: var(--text); font-weight: 600; }
.report-month-chip.active { background: var(--report-accent); color: #fff; }
.report-month-chip .chip-count { font-size: 8px; display: block; color: var(--text-muted); }
.report-month-chip.active .chip-count { color: rgba(255,255,255,.7); }

/* 캘린더 섹션 (특징주) */
.cal-section { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 14px; }
.cal-title { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.cal-year { margin-bottom: 10px; }
.cal-year-label { font-size: 11px; font-weight: 600; color: var(--text-dim); margin-bottom: 6px; }
.cal-months { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
.cal-month {
  font-size: 11px; text-align: center; padding: 5px 4px;
  border-radius: 6px; cursor: pointer;
  color: var(--text-muted); transition: all .12s;
}
.cal-month:hover { background: var(--surface); color: var(--text); }
.cal-month.has-data { color: var(--text); font-weight: 600; }
.cal-month.active { background: var(--accent); color: #fff; }
.cal-month-count { font-size: 9px; font-weight: 400; color: var(--text-muted); display: block; }
.cal-month.active .cal-month-count { color: rgba(255,255,255,.7); }

/* 로딩 */
.loading-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
.loading-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: dot-pulse 1.2s ease-in-out infinite; }
.loading-dot:nth-child(2) { animation-delay: .2s; }
.loading-dot:nth-child(3) { animation-delay: .4s; }
@keyframes dot-pulse { 0%,80%,100% { opacity: .2; transform: scale(.8); } 40% { opacity: 1; transform: scale(1); } }

/* ── 뷰어 영역 ── */
.viewer {
  flex: 1; display: flex; flex-direction: column;
  background: var(--bg); overflow: hidden;
}
.viewer-toolbar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.viewer-close {
  background: var(--border); border: none; color: var(--text);
  padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; gap: 5px;
  transition: background .12s;
}
.viewer-close:hover { background: rgba(59,130,246,.3); color: var(--accent); }
.viewer-title { font-size: 13px; font-weight: 600; color: var(--text); }
.viewer-url { font-size: 11px; color: var(--text-muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.viewer-actions { display: flex; gap: 6px; }
.viewer-btn {
  background: var(--border); border: none; color: var(--text-muted);
  padding: 5px 10px; border-radius: 6px; font-size: 11px;
  cursor: pointer; transition: all .12s; display: flex; align-items: center; gap: 4px;
}
.viewer-btn:hover { background: var(--surface); color: var(--text); }
.viewer-iframe-wrap { flex: 1; position: relative; }
.viewer-iframe { width: 100%; height: 100%; border: none; background: #fff; }

/* 빈 화면 */
.empty-screen {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; color: var(--text-muted);
}
.empty-icon { font-size: 48px; opacity: .3; }
.empty-title { font-size: 15px; font-weight: 600; color: var(--text-dim); }
.empty-desc { font-size: 12px; text-align: center; line-height: 1.6; max-width: 260px; }
.empty-hint {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 14px;
  font-size: 11px; color: var(--text-dim); margin-top: 8px;
}

/* 로딩 오버레이 */
.iframe-loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: #f8fafc; gap: 6px;
  transition: opacity .3s;
}
.iframe-loading.hidden { opacity: 0; pointer-events: none; }

/* ── 비밀번호 잠금 화면 ── */
#lockScreen {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
}
.lock-box {
  background: var(--sidebar);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 36px;
  width: 340px;
  display: flex; flex-direction: column; align-items: center; gap: 18px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
}
.lock-icon { font-size: 40px; }
.lock-title { font-size: 16px; font-weight: 700; color: var(--text); }
.lock-subtitle { font-size: 12px; color: var(--text-muted); margin-top: -10px; }
.lock-input-wrap { width: 100%; position: relative; }
.lock-input {
  width: 100%; background: var(--surface);
  border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-size: 15px; letter-spacing: 2px;
  padding: 11px 44px 11px 14px; outline: none;
  transition: border-color .15s;
}
.lock-input:focus { border-color: var(--accent); }
.lock-input.error { border-color: #ef4444; animation: shake .3s; }
.lock-eye {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  cursor: pointer; color: var(--text-muted); font-size: 16px;
  user-select: none;
}
.lock-btn {
  width: 100%; padding: 11px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 10px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: opacity .15s;
}
.lock-btn:hover { opacity: .85; }
.lock-err { font-size: 12px; color: #f87171; min-height: 16px; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

/* 에러 표시 */
.error-banner {
  margin: 0 0 12px; padding: 10px 14px;
  background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.2);
  border-radius: 8px; font-size: 12px; color: #fca5a5;
  display: none;
}
.error-banner.show { display: block; }

/* 탭 컨텐츠 */
.tab-content { display: none; }
.tab-content.active { display: block; }
</style>
</head>
<body>

<!-- 비밀번호 잠금 화면 -->
<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">🔐</div>
    <div class="lock-title">투자 리서치 허브</div>
    <div class="lock-subtitle">비밀번호를 입력하세요</div>
    <div class="lock-input-wrap">
      <input id="lockInput" class="lock-input" type="password"
        placeholder="Password" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')unlock()">
      <span class="lock-eye" onclick="togglePw()" title="비밀번호 보기">👁</span>
    </div>
    <div class="lock-err" id="lockErr"></div>
    <button class="lock-btn" onclick="unlock()">입력</button>
  </div>
</div>

<!-- 상단 탭바 -->
<div class="topbar">
  <div class="topbar-logo"><span>📊</span> 투자 리서치 허브</div>
  <div class="topbar-stamp" id="lastUpdated">–</div>
  <div class="topbar-spacer"></div>
  <div class="tab-group">
    <button class="tab-btn active" id="tabDaily" onclick="switchTab('daily')">
      ✏️ 특징주 일지<span class="tab-badge" id="dailyCount">0</span>
    </button>
    <button class="tab-btn" id="tabJournal" onclick="switchTab('journal')">
      📓 매매 일지<span class="tab-soon">준비 중</span>
    </button>
    <button class="tab-btn" id="tabReports" onclick="switchTab('reports')">
      📁 종목 리포트<span class="tab-badge-report" id="reportCount" style="display:none">0</span><span class="tab-soon" id="reportSoon">준비 중</span>
    </button>
  </div>
</div>

<!-- 메인 레이아웃 -->
<div class="layout">

  <!-- 사이드바 -->
  <div class="sidebar">
    <div class="sidebar-inner">

      <!-- ===== 특징주 일지 탭 ===== -->
      <div class="tab-content active" id="contentDaily">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="val" id="statDays">–</div>
            <div class="lbl">총 분석일수</div>
          </div>
          <div class="stat-card">
            <div class="val" id="statStocks">–</div>
            <div class="lbl">누적 평가 종목</div>
          </div>
          <div class="stat-card wide">
            <div class="val" id="statLatest" style="font-size:15px">–</div>
            <div class="lbl">최근 업로드</div>
          </div>
        </div>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="날짜 검색 (예: 2026-04)" oninput="filterFiles()">
        </div>
        <div class="error-banner" id="errorBanner">GitHub API 호출 실패. 잠시 후 새로고침 해주세요.</div>
        <div id="fileList">
          <div class="loading-state">
            <div style="margin-bottom:8px">
              <span class="loading-dot"></span>
              <span class="loading-dot"></span>
              <span class="loading-dot"></span>
            </div>
            <div style="font-size:12px">파일 목록을 불러오는 중...</div>
          </div>
        </div>
        <div class="cal-section" id="calSection" style="display:none">
          <div class="cal-title">📅 년도 / 월별 탐색</div>
          <div id="calBody"></div>
        </div>
      </div>

      <!-- ===== 종목 리포트 탭 ===== -->
      <div class="tab-content" id="contentReports">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="val" id="rptStatTotal">–</div>
            <div class="lbl">총 리포트 수</div>
          </div>
          <div class="stat-card">
            <div class="val" id="rptStatDays">–</div>
            <div class="lbl">분석 일수</div>
          </div>
          <div class="stat-card wide">
            <div class="val" id="rptStatLatest" style="font-size:15px">–</div>
            <div class="lbl">최근 업로드</div>
          </div>
        </div>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="reportSearchInput" placeholder="종목명 검색 (예: 삼성전자)" oninput="filterReports()">
        </div>
        <div class="report-month-nav">
          <button onclick="changeReportMonth(-1)">◀</button>
          <div class="report-month-label" id="reportMonthLabel">–</div>
          <button onclick="changeReportMonth(1)">▶</button>
        </div>
        <div class="report-cal-grid" id="reportCalGrid"></div>
        <div id="reportListArea"></div>
        <div class="report-year-jump" id="reportYearJump"></div>
      </div>

    </div>
  </div>

  <!-- 뷰어 -->
  <div class="viewer" id="viewer">
    <div class="empty-screen" id="emptyScreen">
      <div class="empty-icon" id="emptyIcon">📋</div>
      <div class="empty-title" id="emptyTitle">날짜를 선택하세요</div>
      <div class="empty-desc" id="emptyDesc">왼쪽 목록에서 분석일을 클릭하면<br>여기에 바로 표시됩니다</div>
      <div class="empty-hint" id="emptyHint">↖ 목록에서 날짜 클릭 → 이 화면에서 바로 보기</div>
    </div>
    <div id="iframePanel" style="display:none; flex:1; flex-direction:column;">
      <div class="viewer-toolbar">
        <button class="viewer-close" onclick="closeViewer()">← 목록으로</button>
        <div class="viewer-title" id="viewerTitle">–</div>
        <div class="viewer-url" id="viewerUrl">–</div>
        <div class="viewer-actions">
          <button class="viewer-btn" onclick="reloadIframe()">↺ 새로고침</button>
          <button class="viewer-btn" onclick="openExternal()">↗ 새 탭</button>
        </div>
      </div>
      <div class="viewer-iframe-wrap">
        <div class="iframe-loading" id="iframeLoading">
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
          <span style="font-size:12px;color:#64748b;margin-left:6px">불러오는 중...</span>
        </div>
        <iframe id="mainIframe" class="viewer-iframe"
          onload="onIframeLoad()" onerror="onIframeError()"></iframe>
      </div>
    </div>
  </div>
</div>

<script>
// ── 비밀번호 잠금 ──
(function() {
  const CORRECT = 'K2h0918@';
  window.unlock = function() {
    const val = document.getElementById('lockInput').value;
    const input = document.getElementById('lockInput');
    const err   = document.getElementById('lockErr');
    if (val === CORRECT) {
      document.getElementById('lockScreen').style.display = 'none';
      sessionStorage.setItem('hub_auth', '1');
      init();
    } else {
      input.classList.add('error');
      err.textContent = '비밀번호가 틀렸습니다.';
      setTimeout(() => { input.classList.remove('error'); input.value = ''; }, 600);
    }
  };
  window.togglePw = function() {
    const inp = document.getElementById('lockInput');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  };
  if (sessionStorage.getItem('hub_auth') === '1') {
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('lockScreen').style.display = 'none';
    });
  }
})();

// ── 설정 ──
const REPO_OWNER = 'C2Insight';
const REPO_NAME  = 'MyTradingR';
const BASE_URL   = `https://${REPO_OWNER.toLowerCase()}.github.io/${REPO_NAME}`;
const API_BASE   = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`;

// ── 상태 ──
let allFiles = [];
let allReports = [];
let activeFile = null;
let currentTab = 'daily';
let reportCalYear = new Date().getFullYear();
let reportCalMonth = new Date().getMonth() + 1;
let selectedReportDate = null;

// ── 유틸 ──
const DOW = ['일','월','화','수','목','금','토'];
function getDow(dateStr) {
  const [y,m,d] = dateStr.split('-').map(Number);
  return DOW[new Date(y,m-1,d).getDay()];
}
function parseDateFromFilename(name) {
  const m = name.match(/^(\d{4})(\d{2})(\d{2})\.html$/);
  if (!m) return null;
  return `${m[1]}-${m[2]}-${m[3]}`;
}
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ══════════════════════════════════════════════
//  특징주 일지
// ══════════════════════════════════════════════
async function fetchAllFiles() {
  try {
    const yearsRes = await fetch(`${API_BASE}/daily`);
    if (!yearsRes.ok) throw new Error('API 호출 실패');
    const years = (await yearsRes.json()).filter(e => e.type === 'dir');
    const files = [];
    for (const year of years) {
      const monthsRes = await fetch(`${API_BASE}/daily/${year.name}`);
      if (!monthsRes.ok) continue;
      const months = (await monthsRes.json()).filter(e => e.type === 'dir');
      for (const month of months) {
        const filesRes = await fetch(`${API_BASE}/daily/${year.name}/${month.name}`);
        if (!filesRes.ok) continue;
        const htmlFiles = (await filesRes.json())
          .filter(e => e.type === 'file' && e.name.match(/^\d{8}\.html$/));
        for (const f of htmlFiles) {
          const date = parseDateFromFilename(f.name);
          if (!date) continue;
          files.push({
            date, dow: getDow(date), year: year.name, month: month.name,
            path: f.path,
            url: `${BASE_URL}/daily/${year.name}/${month.name}/${f.name}`,
            filename: f.name,
          });
        }
      }
    }
    files.sort((a,b) => b.date.localeCompare(a.date));
    return files;
  } catch(e) { console.error(e); return null; }
}

function renderFileList(files, filter = '') {
  const container = document.getElementById('fileList');
  const filtered = filter ? files.filter(f => f.date.includes(filter)) : files;
  if (!filtered.length) {
    container.innerHTML = `<div class="loading-state" style="font-size:12px">검색 결과 없음</div>`;
    return;
  }
  const grouped = {};
  for (const f of filtered) {
    if (!grouped[f.year]) grouped[f.year] = {};
    if (!grouped[f.year][f.month]) grouped[f.year][f.month] = [];
    grouped[f.year][f.month].push(f);
  }
  let html = '';
  for (const year of Object.keys(grouped).sort().reverse()) {
    html += `<div class="year-group">
      <div class="year-header" onclick="toggleYear(this)">
        <span>▾</span> ${year}년
        <span style="margin-left:auto;font-weight:400">${Object.values(grouped[year]).flat().length}일</span>
      </div><div class="year-body">`;
    for (const month of Object.keys(grouped[year]).sort().reverse()) {
      html += `<div class="month-group"><div class="month-header">${Number(month)}월</div>`;
      for (const f of grouped[year][month]) {
        const isActive = (activeFile?.type === 'daily' && activeFile?.date === f.date) ? 'active' : '';
        html += `<div class="file-item ${isActive}" onclick="loadDailyFile('${f.date}')" data-date="${f.date}">
          <div><div class="file-date">${f.date}</div><div class="file-dow">${f.dow}요일</div></div>
          <span class="file-tag">특징주</span>
        </div>`;
      }
      html += `</div>`;
    }
    html += `</div></div>`;
  }
  container.innerHTML = html;
}

function toggleYear(el) {
  const body = el.nextElementSibling;
  const collapsed = body.style.display === 'none';
  body.style.display = collapsed ? '' : 'none';
  el.querySelector('span').textContent = collapsed ? '▾' : '▸';
}

function renderCalendar(files) {
  const calBody = document.getElementById('calBody');
  const calSection = document.getElementById('calSection');
  const monthMap = {};
  for (const f of files) {
    const key = `${f.year}-${f.month}`;
    if (!monthMap[key]) monthMap[key] = { year: f.year, month: f.month, count: 0 };
    monthMap[key].count++;
  }
  const years = [...new Set(files.map(f => f.year))].sort().reverse();
  let html = '';
  for (const year of years) {
    html += `<div class="cal-year"><div class="cal-year-label">${year}년</div><div class="cal-months">`;
    for (let m = 1; m <= 12; m++) {
      const mm = String(m).padStart(2, '0');
      const key = `${year}-${mm}`;
      const info = monthMap[key];
      html += info
        ? `<div class="cal-month has-data" onclick="filterByMonth('${year}','${mm}')">${m}월<span class="cal-month-count">${info.count}일</span></div>`
        : `<div class="cal-month" style="opacity:.25">${m}월<span class="cal-month-count">–</span></div>`;
    }
    html += `</div></div>`;
  }
  calBody.innerHTML = html;
  calSection.style.display = '';
}

function updateStats(files) {
  document.getElementById('statDays').textContent = files.length;
  document.getElementById('dailyCount').textContent = files.length;
  document.getElementById('statStocks').textContent = '–';
  document.getElementById('statLatest').textContent = files[0]?.date ?? '–';
  document.getElementById('lastUpdated').textContent = `마지막 갱신: ${new Date().toLocaleDateString('ko-KR')}`;
}

function loadDailyFile(date) {
  const file = allFiles.find(f => f.date === date);
  if (!file) return;
  activeFile = { ...file, type: 'daily' };
  showIframe(file.url, `${file.date} (${file.dow})`);
  document.querySelectorAll('#contentDaily .file-item').forEach(el => {
    el.classList.toggle('active', el.dataset.date === date);
  });
}

// ══════════════════════════════════════════════
//  종목 리포트
// ══════════════════════════════════════════════
async function fetchAllReports() {
  try {
    const yearsRes = await fetch(`${API_BASE}/reports`);
    if (!yearsRes.ok) return [];
    const years = (await yearsRes.json()).filter(e => e.type === 'dir');
    const reports = [];
    for (const year of years) {
      const monthsRes = await fetch(`${API_BASE}/reports/${year.name}`);
      if (!monthsRes.ok) continue;
      const months = (await monthsRes.json()).filter(e => e.type === 'dir');
      for (const month of months) {
        const daysRes = await fetch(`${API_BASE}/reports/${year.name}/${month.name}`);
        if (!daysRes.ok) continue;
        const days = (await daysRes.json()).filter(e => e.type === 'dir');
        for (const day of days) {
          const filesRes = await fetch(`${API_BASE}/reports/${year.name}/${month.name}/${day.name}`);
          if (!filesRes.ok) continue;
          const htmlFiles = (await filesRes.json())
            .filter(e => e.type === 'file' && e.name.endsWith('.html'));
          for (const f of htmlFiles) {
            const dateStr = `${year.name}-${month.name}-${day.name}`;
            const title = f.name.replace(/\.html$/, '').replace(/_/g, ' ');
            reports.push({
              date: dateStr, dow: getDow(dateStr),
              year: year.name, month: month.name, day: day.name,
              title, path: f.path, filename: f.name,
              url: `${BASE_URL}/reports/${year.name}/${month.name}/${day.name}/${encodeURIComponent(f.name)}`,
            });
          }
        }
      }
    }
    reports.sort((a,b) => {
      const dc = b.date.localeCompare(a.date);
      return dc !== 0 ? dc : a.title.localeCompare(b.title);
    });
    return reports;
  } catch(e) { console.error('리포트 로드 실패:', e); return []; }
}

function updateReportStats() {
  const total = allReports.length;
  const days = new Set(allReports.map(r => r.date)).size;
  document.getElementById('rptStatTotal').textContent = total || '–';
  document.getElementById('rptStatDays').textContent = days || '–';
  document.getElementById('rptStatLatest').textContent = allReports[0]?.date ?? '–';
  const badge = document.getElementById('reportCount');
  const soon = document.getElementById('reportSoon');
  if (total > 0) {
    badge.textContent = total;
    badge.style.display = 'inline-block';
    soon.style.display = 'none';
  }
  if (allReports.length > 0) {
    reportCalYear = parseInt(allReports[0].year);
    reportCalMonth = parseInt(allReports[0].month);
  }
}

function renderReportCalendar() {
  const grid = document.getElementById('reportCalGrid');
  const label = document.getElementById('reportMonthLabel');
  label.textContent = `${reportCalYear}년 ${reportCalMonth}월`;

  const mm = String(reportCalMonth).padStart(2, '0');
  const yy = String(reportCalYear);
  const monthReports = allReports.filter(r => r.year === yy && r.month === mm);
  const dayCountMap = {};
  for (const r of monthReports) { dayCountMap[r.day] = (dayCountMap[r.day] || 0) + 1; }

  const firstDay = new Date(reportCalYear, reportCalMonth - 1, 1).getDay();
  const daysInMonth = new Date(reportCalYear, reportCalMonth, 0).getDate();
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  let html = '';
  ['일','월','화','수','목','금','토'].forEach((d, i) => {
    html += `<div class="report-cal-dow ${i===0?'sun':i===6?'sat':''}">${d}</div>`;
  });
  for (let i = 0; i < firstDay; i++) html += `<div class="report-cal-day empty"></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const dd = String(d).padStart(2, '0');
    const dateStr = `${yy}-${mm}-${dd}`;
    const count = dayCountMap[dd] || 0;
    const dow = new Date(reportCalYear, reportCalMonth - 1, d).getDay();
    let cls = '';
    if (count > 0) cls += ' has-data';
    if (selectedReportDate === dateStr) cls += ' selected';
    if (dow === 0) cls += ' sun-day';
    if (dow === 6) cls += ' sat-day';
    if (dateStr === todayStr) cls += ' today';
    const onclick = count > 0 ? `onclick="selectReportDate('${dateStr}')"` : '';
    const countLabel = count > 0 ? `<span class="day-count">${count}</span>` : '';
    html += `<div class="report-cal-day${cls}" ${onclick}>${d}${countLabel}</div>`;
  }
  grid.innerHTML = html;
  renderReportYearJump();
}

function changeReportMonth(delta) {
  reportCalMonth += delta;
  if (reportCalMonth > 12) { reportCalMonth = 1; reportCalYear++; }
  if (reportCalMonth < 1) { reportCalMonth = 12; reportCalYear--; }
  selectedReportDate = null;
  document.getElementById('reportListArea').innerHTML = '';
  renderReportCalendar();
}

function selectReportDate(dateStr) {
  selectedReportDate = dateStr;
  renderReportCalendar();
  renderReportList(dateStr);
}

function renderReportList(dateStr) {
  const area = document.getElementById('reportListArea');
  const searchQ = document.getElementById('reportSearchInput').value.trim().toLowerCase();
  let reports = allReports.filter(r => r.date === dateStr);
  if (searchQ) reports = reports.filter(r => r.title.toLowerCase().includes(searchQ));

  if (!reports.length) {
    area.innerHTML = `<div class="report-no-data">해당 날짜에 리포트가 없습니다</div>`;
    return;
  }
  const dow = getDow(dateStr);
  let html = `<div class="report-date-header">📅 ${dateStr} (${dow}) <span class="rpt-count">${reports.length}개</span></div>`;
  for (const r of reports) {
    const isActive = activeFile?.url === r.url ? 'active' : '';
    html += `<div class="report-item ${isActive}" onclick="loadReport('${r.url}','${escapeHtml(r.title)}','${r.date}')" data-url="${r.url}">
      <span class="rpt-icon">📄</span>
      <span class="rpt-name" title="${escapeHtml(r.title)}">${escapeHtml(r.title)}</span>
      <span class="rpt-tag">리포트</span>
    </div>`;
  }
  area.innerHTML = html;
}

function loadReport(url, title, date) {
  const dow = getDow(date);
  activeFile = { url, title, date, type: 'report' };
  showIframe(url, `${title} — ${date} (${dow})`);
  document.querySelectorAll('#contentReports .report-item').forEach(el => {
    el.classList.toggle('active', el.dataset.url === url);
  });
}

function renderReportYearJump() {
  const container = document.getElementById('reportYearJump');
  const ymMap = {};
  for (const r of allReports) {
    if (!ymMap[r.year]) ymMap[r.year] = {};
    if (!ymMap[r.year][r.month]) ymMap[r.year][r.month] = 0;
    ymMap[r.year][r.month]++;
  }
  const years = Object.keys(ymMap).sort().reverse();
  if (!years.length) { container.innerHTML = ''; return; }

  let html = `<div class="report-year-jump-title">📅 년도 / 월 이동</div>`;
  for (const year of years) {
    html += `<div style="margin-bottom:8px"><div style="font-size:11px;font-weight:600;color:var(--text-dim);margin-bottom:4px">${year}년</div>`;
    html += `<div class="report-months-grid">`;
    for (let m = 1; m <= 12; m++) {
      const mm = String(m).padStart(2, '0');
      const count = ymMap[year]?.[mm] || 0;
      const isActive = (parseInt(year) === reportCalYear && m === reportCalMonth);
      if (count > 0) {
        html += `<div class="report-month-chip has-data${isActive?' active':''}" onclick="jumpToReportMonth(${year},${m})">${m}월<span class="chip-count">${count}개</span></div>`;
      } else {
        html += `<div class="report-month-chip" style="opacity:.3">${m}월<span class="chip-count">–</span></div>`;
      }
    }
    html += `</div></div>`;
  }
  container.innerHTML = html;
}

function jumpToReportMonth(year, month) {
  reportCalYear = year;
  reportCalMonth = month;
  selectedReportDate = null;
  document.getElementById('reportListArea').innerHTML = '';
  renderReportCalendar();
}

function filterReports() {
  const q = document.getElementById('reportSearchInput').value.trim();
  if (!q) {
    if (selectedReportDate) renderReportList(selectedReportDate);
    else document.getElementById('reportListArea').innerHTML = '';
    return;
  }
  const filtered = allReports.filter(r =>
    r.title.toLowerCase().includes(q.toLowerCase()) || r.date.includes(q)
  );
  const area = document.getElementById('reportListArea');
  if (!filtered.length) {
    area.innerHTML = `<div class="report-no-data">"${escapeHtml(q)}" 검색 결과 없음</div>`;
    return;
  }
  const grouped = {};
  for (const r of filtered) { if (!grouped[r.date]) grouped[r.date] = []; grouped[r.date].push(r); }
  let html = '';
  for (const date of Object.keys(grouped).sort().reverse()) {
    const dow = getDow(date);
    const reports = grouped[date];
    html += `<div class="report-date-header">📅 ${date} (${dow}) <span class="rpt-count">${reports.length}개</span></div>`;
    for (const r of reports) {
      const isActive = activeFile?.url === r.url ? 'active' : '';
      html += `<div class="report-item ${isActive}" onclick="loadReport('${r.url}','${escapeHtml(r.title)}','${r.date}')" data-url="${r.url}">
        <span class="rpt-icon">📄</span>
        <span class="rpt-name" title="${escapeHtml(r.title)}">${escapeHtml(r.title)}</span>
        <span class="rpt-tag">리포트</span>
      </div>`;
    }
  }
  area.innerHTML = html;
}

// ══════════════════════════════════════════════
//  공통 뷰어
// ══════════════════════════════════════════════
function showIframe(url, title) {
  document.getElementById('emptyScreen').style.display = 'none';
  const panel = document.getElementById('iframePanel');
  panel.style.display = 'flex';
  document.getElementById('viewerTitle').textContent = title;
  document.getElementById('viewerUrl').textContent = url;
  const iframe = document.getElementById('mainIframe');
  document.getElementById('iframeLoading').classList.remove('hidden');
  iframe.src = url;
}
function onIframeLoad() { document.getElementById('iframeLoading').classList.add('hidden'); }
function onIframeError() { document.getElementById('iframeLoading').classList.add('hidden'); }
function closeViewer() {
  activeFile = null;
  document.getElementById('iframePanel').style.display = 'none';
  document.getElementById('emptyScreen').style.display = 'flex';
  document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.report-item').forEach(el => el.classList.remove('active'));
}
function reloadIframe() {
  const iframe = document.getElementById('mainIframe');
  document.getElementById('iframeLoading').classList.remove('hidden');
  iframe.src = iframe.src;
}
function openExternal() { if (activeFile) window.open(activeFile.url, '_blank'); }

// ── 필터 ──
function filterFiles() {
  const q = document.getElementById('searchInput').value.trim();
  renderFileList(allFiles, q);
}
function filterByMonth(year, month) {
  document.getElementById('searchInput').value = `${year}-${month}`;
  filterFiles();
}

// ── 탭 전환 ──
function switchTab(tab) {
  if (tab === 'journal') { alert('준비 중인 기능입니다.'); return; }
  currentTab = tab;
  document.getElementById('tabDaily').className = 'tab-btn' + (tab === 'daily' ? ' active' : '');
  document.getElementById('tabJournal').className = 'tab-btn';
  document.getElementById('tabReports').className = 'tab-btn' + (tab === 'reports' ? ' active-report' : '');
  document.getElementById('contentDaily').className = 'tab-content' + (tab === 'daily' ? ' active' : '');
  document.getElementById('contentReports').className = 'tab-content' + (tab === 'reports' ? ' active' : '');
  closeViewer();
  if (tab === 'reports') {
    document.getElementById('emptyIcon').textContent = '📁';
    document.getElementById('emptyTitle').textContent = '리포트를 선택하세요';
    document.getElementById('emptyDesc').innerHTML = '왼쪽 달력에서 날짜를 클릭한 후<br>리포트를 선택하면 여기에 표시됩니다';
    document.getElementById('emptyHint').textContent = '↖ 달력에서 날짜 → 리포트 선택 → 바로 보기';
  } else {
    document.getElementById('emptyIcon').textContent = '📋';
    document.getElementById('emptyTitle').textContent = '날짜를 선택하세요';
    document.getElementById('emptyDesc').innerHTML = '왼쪽 목록에서 분석일을 클릭하면<br>여기에 바로 표시됩니다';
    document.getElementById('emptyHint').textContent = '↖ 목록에서 날짜 클릭 → 이 화면에서 바로 보기';
  }
}

// ── 초기화 ──
async function init() {
  const files = await fetchAllFiles();
  if (!files) {
    document.getElementById('errorBanner').classList.add('show');
    document.getElementById('fileList').innerHTML = `<div class="loading-state" style="font-size:12px">파일 목록 로드 실패</div>`;
  } else {
    allFiles = files;
    updateStats(files);
    renderFileList(files);
    renderCalendar(files);
  }
  const reports = await fetchAllReports();
  allReports = reports;
  updateReportStats();
  renderReportCalendar();

  const hash = location.hash.replace('#','');
  if (hash && allFiles.find(f => f.date === hash)) loadDailyFile(hash);
}

document.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('hub_auth') === '1') {
    document.getElementById('lockScreen').style.display = 'none';
    init();
  }
});
</script>
