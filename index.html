<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투자 리서치 허브</title>
<style>
:root {
  --bg: #0d0f14;
  --sidebar: #12151c;
  --surface: #181c25;
  --border: #252a38;
  --accent: #3b82f6;
  --accent2: #10b981;
  --warn: #f59e0b;
  --text: #e2e8f0;
  --text-muted: #64748b;
  --text-dim: #94a3b8;
  --tag-daily: #1d4ed8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── 상단 헤더 ── */
.topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px;
  height: 52px;
  background: var(--sidebar);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 100;
}
.topbar-logo { font-size: 18px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
.topbar-logo span { font-size: 20px; }
.topbar-stamp {
  font-size: 10px; color: var(--text-muted);
  background: var(--border); border-radius: 4px; padding: 2px 8px;
}
.topbar-spacer { flex: 1; }
.tab-group { display: flex; gap: 4px; }
.tab-btn {
  font-size: 12px; font-weight: 600;
  padding: 5px 14px; border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text-muted);
  cursor: pointer; transition: all .15s;
}
.tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.tab-btn:hover:not(.active) { border-color: var(--accent); color: var(--text); }
.tab-badge {
  display: inline-block; background: var(--accent2);
  color: #fff; font-size: 9px; font-weight: 700;
  padding: 1px 5px; border-radius: 99px; margin-left: 4px;
}
.tab-soon {
  font-size: 9px; color: var(--text-muted);
  background: var(--border); border-radius: 99px;
  padding: 1px 6px; margin-left: 4px;
}

/* ── 메인 레이아웃 ── */
.layout {
  display: flex; flex: 1; overflow: hidden;
}

/* ── 사이드바 ── */
.sidebar {
  width: 320px; flex-shrink: 0;
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-inner { flex: 1; overflow-y: auto; padding: 16px; }
.sidebar-inner::-webkit-scrollbar { width: 4px; }
.sidebar-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* 통계 카드 */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px;
}
.stat-card .val { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1.2; }
.stat-card .lbl { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.stat-card.wide { grid-column: span 2; }

/* 검색 */
.search-wrap { position: relative; margin-bottom: 14px; }
.search-wrap input {
  width: 100%; background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 12px;
  padding: 8px 12px 8px 32px; outline: none;
  transition: border-color .15s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--text-muted); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 13px; }

/* 날짜별 그룹 */
.year-group { margin-bottom: 12px; }
.year-header {
  font-size: 11px; font-weight: 700; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: .08em;
  padding: 4px 0; margin-bottom: 6px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px; cursor: pointer;
}
.month-group { margin-bottom: 8px; }
.month-header {
  font-size: 10px; color: var(--text-muted); font-weight: 600;
  padding: 2px 4px; margin-bottom: 4px;
}
.file-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 7px;
  cursor: pointer; transition: background .12s;
  border: 1px solid transparent;
  margin-bottom: 2px;
}
.file-item:hover { background: var(--surface); border-color: var(--border); }
.file-item.active { background: rgba(59,130,246,.12); border-color: rgba(59,130,246,.35); }
.file-date { font-size: 13px; font-weight: 600; color: var(--text); }
.file-dow { font-size: 10px; color: var(--text-muted); }
.file-tag {
  font-size: 9px; font-weight: 700; padding: 2px 7px;
  border-radius: 99px; margin-left: auto;
  background: rgba(29,78,216,.3); color: #93c5fd; border: 1px solid rgba(29,78,216,.4);
}
.file-count { font-size: 10px; color: var(--text-muted); }

/* 캘린더 섹션 */
.cal-section { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 14px; }
.cal-title { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.cal-year { margin-bottom: 10px; }
.cal-year-label { font-size: 11px; font-weight: 600; color: var(--text-dim); margin-bottom: 6px; }
.cal-months { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
.cal-month {
  font-size: 11px; text-align: center; padding: 5px 4px;
  border-radius: 6px; cursor: pointer;
  color: var(--text-muted); transition: all .12s;
}
.cal-month:hover { background: var(--surface); color: var(--text); }
.cal-month.has-data { color: var(--text); font-weight: 600; }
.cal-month.active { background: var(--accent); color: #fff; }
.cal-month-count { font-size: 9px; font-weight: 400; color: var(--text-muted); display: block; }
.cal-month.active .cal-month-count { color: rgba(255,255,255,.7); }

/* 로딩 */
.loading-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
.loading-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: dot-pulse 1.2s ease-in-out infinite; }
.loading-dot:nth-child(2) { animation-delay: .2s; }
.loading-dot:nth-child(3) { animation-delay: .4s; }
@keyframes dot-pulse { 0%,80%,100% { opacity: .2; transform: scale(.8); } 40% { opacity: 1; transform: scale(1); } }

/* ── 뷰어 영역 ── */
.viewer {
  flex: 1; display: flex; flex-direction: column;
  background: var(--bg); overflow: hidden;
}
.viewer-toolbar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.viewer-close {
  background: var(--border); border: none; color: var(--text);
  padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; gap: 5px;
  transition: background .12s;
}
.viewer-close:hover { background: rgba(59,130,246,.3); color: var(--accent); }
.viewer-title { font-size: 13px; font-weight: 600; color: var(--text); }
.viewer-url { font-size: 11px; color: var(--text-muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.viewer-actions { display: flex; gap: 6px; }
.viewer-btn {
  background: var(--border); border: none; color: var(--text-muted);
  padding: 5px 10px; border-radius: 6px; font-size: 11px;
  cursor: pointer; transition: all .12s; display: flex; align-items: center; gap: 4px;
}
.viewer-btn:hover { background: var(--surface); color: var(--text); }
.viewer-iframe-wrap { flex: 1; position: relative; }
.viewer-iframe {
  width: 100%; height: 100%; border: none;
  background: #fff;
}

/* 빈 화면 */
.empty-screen {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; color: var(--text-muted);
}
.empty-icon { font-size: 48px; opacity: .3; }
.empty-title { font-size: 15px; font-weight: 600; color: var(--text-dim); }
.empty-desc { font-size: 12px; text-align: center; line-height: 1.6; max-width: 260px; }
.empty-hint {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 14px;
  font-size: 11px; color: var(--text-dim); margin-top: 8px;
}

/* 로딩 오버레이 */
.iframe-loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: #f8fafc; gap: 6px;
  transition: opacity .3s;
}
.iframe-loading.hidden { opacity: 0; pointer-events: none; }

/* 에러 표시 */
.error-banner {
  margin: 12px; padding: 10px 14px;
  background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.2);
  border-radius: 8px; font-size: 12px; color: #fca5a5;
  display: none;
}
.error-banner.show { display: block; }
</style>
</head>
<body>

<!-- 상단 탭바 -->
<div class="topbar">
  <div class="topbar-logo"><span>📊</span> 투자 리서치 허브</div>
  <div class="topbar-stamp" id="lastUpdated">–</div>
  <div class="topbar-spacer"></div>
  <div class="tab-group">
    <button class="tab-btn active" onclick="switchTab('daily')">
      ✏️ 특징주 일지<span class="tab-badge" id="dailyCount">0</span>
    </button>
    <button class="tab-btn" onclick="switchTab('journal')">
      📓 매매 일지<span class="tab-soon">준비 중</span>
    </button>
    <button class="tab-btn" onclick="switchTab('reports')">
      📁 종목 리포트<span class="tab-soon">준비 중</span>
    </button>
  </div>
</div>

<!-- 메인 레이아웃 -->
<div class="layout">

  <!-- 사이드바 -->
  <div class="sidebar">
    <div class="sidebar-inner">

      <!-- 통계 카드 -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="val" id="statDays">–</div>
          <div class="lbl">총 분석일수</div>
        </div>
        <div class="stat-card">
          <div class="val" id="statStocks">–</div>
          <div class="lbl">누적 평가 종목</div>
        </div>
        <div class="stat-card wide">
          <div class="val" id="statLatest" style="font-size:15px">–</div>
          <div class="lbl">최근 업로드</div>
        </div>
      </div>

      <!-- 검색 -->
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="날짜 검색 (예: 2026-04)" oninput="filterFiles()">
      </div>

      <!-- 오류 -->
      <div class="error-banner" id="errorBanner">
        GitHub API 호출 실패. 잠시 후 새로고침 해주세요.
      </div>

      <!-- 파일 목록 -->
      <div id="fileList">
        <div class="loading-state">
          <div style="margin-bottom:8px">
            <span class="loading-dot"></span>
            <span class="loading-dot"></span>
            <span class="loading-dot"></span>
          </div>
          <div style="font-size:12px">파일 목록을 불러오는 중...</div>
        </div>
      </div>

      <!-- 캘린더 -->
      <div class="cal-section" id="calSection" style="display:none">
        <div class="cal-title">📅 년도 / 월별 탐색</div>
        <div id="calBody"></div>
      </div>

    </div>
  </div>

  <!-- 뷰어 -->
  <div class="viewer" id="viewer">

    <!-- 빈 화면 (기본) -->
    <div class="empty-screen" id="emptyScreen">
      <div class="empty-icon">📋</div>
      <div class="empty-title">날짜를 선택하세요</div>
      <div class="empty-desc">왼쪽 목록에서 분석일을 클릭하면<br>여기에 바로 표시됩니다</div>
      <div class="empty-hint">↖ 목록에서 날짜 클릭 → 이 화면에서 바로 보기</div>
    </div>

    <!-- iframe 뷰어 (숨김 기본) -->
    <div id="iframePanel" style="display:none; flex:1; flex-direction:column;">
      <div class="viewer-toolbar">
        <button class="viewer-close" onclick="closeViewer()">← 목록으로</button>
        <div class="viewer-title" id="viewerTitle">–</div>
        <div class="viewer-url" id="viewerUrl">–</div>
        <div class="viewer-actions">
          <button class="viewer-btn" onclick="reloadIframe()">↺ 새로고침</button>
          <button class="viewer-btn" onclick="openExternal()">↗ 새 탭</button>
        </div>
      </div>
      <div class="viewer-iframe-wrap">
        <div class="iframe-loading" id="iframeLoading">
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
          <span style="font-size:12px;color:#64748b;margin-left:6px">불러오는 중...</span>
        </div>
        <iframe id="mainIframe" class="viewer-iframe"
          onload="onIframeLoad()"
          onerror="onIframeError()">
        </iframe>
      </div>
    </div>

  </div>
</div>

<script>
// ── 설정 ──
const REPO_OWNER = 'C2Insight';
const REPO_NAME  = 'MyTradingR';
const BASE_URL   = `https://${REPO_OWNER.toLowerCase()}.github.io/${REPO_NAME}`;
const API_BASE   = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`;

// ── 상태 ──
let allFiles = [];       // {date, dow, year, month, path, url, count} 전체 목록
let activeFile = null;
let currentTab = 'daily';

// ── 요일 변환 ──
const DOW = ['일','월','화','수','목','금','토'];
function getDow(dateStr) {
  const [y,m,d] = dateStr.split('-').map(Number);
  return DOW[new Date(y,m-1,d).getDay()];
}

// ── 파일명에서 날짜 추출 ──
function parseDateFromFilename(name) {
  // 20260410.html → 2026-04-10
  const m = name.match(/^(\d{4})(\d{2})(\d{2})\.html$/);
  if (!m) return null;
  return `${m[1]}-${m[2]}-${m[3]}`;
}

// ── 날짜 파일명에서 종목수 추출 (파일명 기반, 실제론 미확인) ──
function countFromMeta(dateStr) {
  // 파일 내용을 미리 파싱하기 어려우므로 우선 "-" 반환
  return '?';
}

// ── GitHub API로 연도 탐색 → 월 탐색 → 파일 수집 ──
async function fetchAllFiles() {
  try {
    // daily/ 하위 연도 폴더 목록
    const yearsRes = await fetch(`${API_BASE}/daily`);
    if (!yearsRes.ok) throw new Error('API 호출 실패');
    const years = (await yearsRes.json()).filter(e => e.type === 'dir');

    const files = [];
    for (const year of years) {
      const monthsRes = await fetch(`${API_BASE}/daily/${year.name}`);
      if (!monthsRes.ok) continue;
      const months = (await monthsRes.json()).filter(e => e.type === 'dir');

      for (const month of months) {
        const filesRes = await fetch(`${API_BASE}/daily/${year.name}/${month.name}`);
        if (!filesRes.ok) continue;
        const htmlFiles = (await filesRes.json())
          .filter(e => e.type === 'file' && e.name.match(/^\d{8}\.html$/));

        for (const f of htmlFiles) {
          const date = parseDateFromFilename(f.name);
          if (!date) continue;
          files.push({
            date,
            dow: getDow(date),
            year: year.name,
            month: month.name,
            path: f.path,
            url: `${BASE_URL}/daily/${year.name}/${month.name}/${f.name}`,
            filename: f.name,
          });
        }
      }
    }

    // 내림차순 정렬
    files.sort((a,b) => b.date.localeCompare(a.date));
    return files;

  } catch(e) {
    console.error(e);
    return null;
  }
}

// ── 종목 수 추출 (meta 태그 또는 제목에서) ──
// 너무 무거우므로, file item에 "?개" 대신 파일명 인접 숫자로 표시
// 실제 종목수는 파일 로드 시 iframe title에서 파싱 가능

// ── 렌더링 ──
function renderFileList(files, filter = '') {
  const container = document.getElementById('fileList');
  const filtered = filter
    ? files.filter(f => f.date.includes(filter))
    : files;

  if (!filtered.length) {
    container.innerHTML = `<div class="loading-state" style="font-size:12px">검색 결과 없음</div>`;
    return;
  }

  // 연도 → 월 그룹핑
  const grouped = {};
  for (const f of filtered) {
    if (!grouped[f.year]) grouped[f.year] = {};
    if (!grouped[f.year][f.month]) grouped[f.year][f.month] = [];
    grouped[f.year][f.month].push(f);
  }

  let html = '';
  for (const year of Object.keys(grouped).sort().reverse()) {
    html += `<div class="year-group">
      <div class="year-header" onclick="toggleYear(this)">
        <span>▾</span> ${year}년
        <span style="margin-left:auto;font-weight:400">${Object.values(grouped[year]).flat().length}일</span>
      </div>
      <div class="year-body">`;

    for (const month of Object.keys(grouped[year]).sort().reverse()) {
      html += `<div class="month-group">
        <div class="month-header">${Number(month)}월</div>`;
      for (const f of grouped[year][month]) {
        const isActive = activeFile?.date === f.date ? 'active' : '';
        html += `
        <div class="file-item ${isActive}" onclick="loadFile('${f.date}')" data-date="${f.date}">
          <div>
            <div class="file-date">${f.date}</div>
            <div class="file-dow">${f.dow}요일</div>
          </div>
          <span class="file-tag">특징주</span>
        </div>`;
      }
      html += `</div>`;
    }
    html += `</div></div>`;
  }

  container.innerHTML = html;
}

function toggleYear(el) {
  const body = el.nextElementSibling;
  const collapsed = body.style.display === 'none';
  body.style.display = collapsed ? '' : 'none';
  el.querySelector('span').textContent = collapsed ? '▾' : '▸';
}

// ── 캘린더 렌더 ──
function renderCalendar(files) {
  const calBody = document.getElementById('calBody');
  const calSection = document.getElementById('calSection');

  const monthMap = {};
  for (const f of files) {
    const key = `${f.year}-${f.month}`;
    if (!monthMap[key]) monthMap[key] = { year: f.year, month: f.month, count: 0 };
    monthMap[key].count++;
  }

  const years = [...new Set(files.map(f => f.year))].sort().reverse();
  let html = '';
  for (const year of years) {
    html += `<div class="cal-year"><div class="cal-year-label">${year}년</div><div class="cal-months">`;
    for (let m = 1; m <= 12; m++) {
      const mm = String(m).padStart(2, '0');
      const key = `${year}-${mm}`;
      const info = monthMap[key];
      const cls = info ? 'has-data' : '';
      html += info
        ? `<div class="cal-month ${cls}" onclick="filterByMonth('${year}','${mm}')">${m}월<span class="cal-month-count">${info.count}일</span></div>`
        : `<div class="cal-month" style="opacity:.25">${m}월<span class="cal-month-count">–</span></div>`;
    }
    html += `</div></div>`;
  }
  calBody.innerHTML = html;
  calSection.style.display = '';
}

// ── 통계 업데이트 ──
function updateStats(files) {
  document.getElementById('statDays').textContent = files.length;
  document.getElementById('dailyCount').textContent = files.length;
  // 누적 종목수는 미파악 → 파일 수 × 추정값 또는 '-' 표시
  document.getElementById('statStocks').textContent = '–';
  document.getElementById('statLatest').textContent = files[0]?.date ?? '–';
  document.getElementById('lastUpdated').textContent = `마지막 갱신: ${new Date().toLocaleDateString('ko-KR')}`;
}

// ── 파일 로드 (iframe) ──
function loadFile(date) {
  const file = allFiles.find(f => f.date === date);
  if (!file) return;

  activeFile = file;
  document.getElementById('emptyScreen').style.display = 'none';
  const panel = document.getElementById('iframePanel');
  panel.style.display = 'flex';

  document.getElementById('viewerTitle').textContent = `${file.date} (${file.dow})`;
  document.getElementById('viewerUrl').textContent = file.url;

  const iframe = document.getElementById('mainIframe');
  document.getElementById('iframeLoading').classList.remove('hidden');
  iframe.src = file.url;

  // 사이드바 active 클래스 갱신
  document.querySelectorAll('.file-item').forEach(el => {
    el.classList.toggle('active', el.dataset.date === date);
  });
}

function onIframeLoad() {
  document.getElementById('iframeLoading').classList.add('hidden');
}
function onIframeError() {
  document.getElementById('iframeLoading').classList.add('hidden');
}

function closeViewer() {
  activeFile = null;
  document.getElementById('iframePanel').style.display = 'none';
  document.getElementById('emptyScreen').style.display = 'flex';
  document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
}

function reloadIframe() {
  const iframe = document.getElementById('mainIframe');
  document.getElementById('iframeLoading').classList.remove('hidden');
  iframe.src = iframe.src;
}

function openExternal() {
  if (activeFile) window.open(activeFile.url, '_blank');
}

// ── 검색 / 필터 ──
function filterFiles() {
  const q = document.getElementById('searchInput').value.trim();
  renderFileList(allFiles, q);
}

function filterByMonth(year, month) {
  document.getElementById('searchInput').value = `${year}-${month}`;
  filterFiles();
}

// ── 탭 전환 ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['daily','journal','reports'][i] === tab);
  });
  // 준비 중 탭 클릭 시 안내 (추후 구현)
  if (tab !== 'daily') {
    alert('준비 중인 기능입니다.');
    document.querySelectorAll('.tab-btn')[0].classList.add('active');
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      if (i > 0) btn.classList.remove('active');
    });
  }
}

// ── 초기화 ──
async function init() {
  const files = await fetchAllFiles();

  if (!files) {
    document.getElementById('errorBanner').classList.add('show');
    document.getElementById('fileList').innerHTML = `<div class="loading-state" style="font-size:12px">파일 목록 로드 실패</div>`;
    return;
  }

  allFiles = files;
  updateStats(files);
  renderFileList(files);
  renderCalendar(files);

  // URL hash로 특정 날짜 자동 로드
  const hash = location.hash.replace('#','');
  if (hash && files.find(f => f.date === hash)) {
    loadFile(hash);
  }
}

init();
</script>
</body>
