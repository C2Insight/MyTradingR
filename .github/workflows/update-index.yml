name: Update Site Index

on:
  push:
    paths:
      - 'daily/**'
      - 'reports/**'
      - 'journal/**'
    branches: [main]

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate site-index.json
        run: python3 scripts/generate_index.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/site-index.json
          git diff --cached --quiet || git commit -m "🔄 site-index.json 자동 갱신"
          git push
